name: Lint

on:
  push:
    branches: [main, 'fix/**', 'feat/**', 'chore/**', 'docs/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ESLint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run linter
        run: npm run lint
